<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">

  <!-- Flat-top hexagon: cx=110, cy=110, r=90 -->
  <!-- vertices: TL(65,32) TR(155,32) R(200,110) BR(155,188) BL(65,188) L(20,110) -->
  <polygon
    points="65,32 155,32 200,110 155,188 65,188 20,110"
    fill="white"
    stroke="#C6963A"
    stroke-width="7"
    stroke-linejoin="round"
  />

  <!-- L mark — drawn as strokes for geometric look -->
  <polyline
    points="78,62 78,148 138,148"
    fill="none"
    stroke="#1a1f3c"
    stroke-width="13"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Molecular bond: small dot → line → large dot (gold) -->
  <line
    x1="132" y1="118"
    x2="163" y2="82"
    stroke="#C6963A"
    stroke-width="4"
    stroke-linecap="round"
  />
  <!-- small dot (near L corner) -->
  <circle cx="132" cy="118" r="8" fill="#C6963A"/>
  <!-- large dot (upper right) -->
  <circle cx="163" cy="82" r="11" fill="#C6963A"/>

</svg>
