<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">

  <!-- Flat-top hexagon with rounded corners -->
  <path
    d="M188,99.6 L158,47.4 Q152,37 140,37 L80,37 Q68,37 62,47.4 L32,99.6 Q26,110 32,120.4 L62,172.6 Q68,183 80,183 L140,183 Q152,183 158,172.6 L188,120.4 Q194,110 188,99.6 Z"
    fill="white"
    stroke="#C6963A"
    stroke-width="9"
  />

  <!-- L — pulled in, lighter, more breathing room -->
  <polyline
    points="82,70 82,148 142,148"
    fill="none"
    stroke="#1a1f3c"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Dots: lower bigger, upper smaller, both with clear space from hexagon edge -->
  <line
    x1="147" y1="124"
    x2="166" y2="96"
    stroke="#C6963A"
    stroke-width="2"
    stroke-linecap="round"
  />
  <circle cx="147" cy="124" r="9"  fill="#C6963A"/>
  <circle cx="166" cy="96"  r="6"  fill="#C6963A"/>

</svg>
