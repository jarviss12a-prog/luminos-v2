<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <defs>
    <filter id="round-corners" x="-5%" y="-5%" width="110%" height="110%">
      <feMorphology operator="erode" radius="5" result="eroded"/>
      <feMorphology in="eroded" operator="dilate" radius="5"/>
    </filter>
  </defs>

  <!-- Flat-top hexagon with rounded corners via filter -->
  <polygon
    points="194,110 152,37 68,37 26,110 68,183 152,183"
    fill="white"
    stroke="#C6963A"
    stroke-width="9"
    stroke-linejoin="round"
    filter="url(#round-corners)"
  />

  <!-- L — smaller, centered, breathing room -->
  <polyline
    points="90,70 90,150 146,150"
    fill="none"
    stroke="#1a1f3c"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Molecular bond — dots pulled slightly inward -->
  <line
    x1="152" y1="115"
    x2="172" y2="83"
    stroke="#C6963A"
    stroke-width="2.5"
    stroke-linecap="round"
  />
  <circle cx="152" cy="115" r="6.5" fill="#C6963A"/>
  <circle cx="172" cy="83" r="6.5" fill="#C6963A"/>

</svg>
