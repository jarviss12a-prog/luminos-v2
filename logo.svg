<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">

  <!-- Flat-top hexagon: cx=110, cy=110, r=88 -->
  <!-- Right(198,110) UR(154,34) UL(66,34) Left(22,110) LL(66,186) LR(154,186) -->
  <polygon
    points="198,110 154,34 66,34 22,110 66,186 154,186"
    fill="white"
    stroke="#C6963A"
    stroke-width="11"
    stroke-linejoin="round"
  />

  <!-- L — thick, rounded corner, dark navy -->
  <polyline
    points="82,58 82,158 150,158"
    fill="none"
    stroke="#1a1f3c"
    stroke-width="16"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Molecular bond: two equal gold dots + connecting line -->
  <line
    x1="148" y1="148"
    x2="178" y2="104"
    stroke="#C6963A"
    stroke-width="3"
    stroke-linecap="round"
  />
  <circle cx="148" cy="148" r="9.5" fill="#C6963A"/>
  <circle cx="178" cy="104" r="9.5" fill="#C6963A"/>

</svg>
