<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">

  <!-- Flat-top hexagon — sharp straight edges -->
  <polygon
    points="194,110 152,37 68,37 26,110 68,183 152,183"
    fill="white"
    stroke="#C6963A"
    stroke-width="9"
    stroke-linejoin="miter"
  />

  <!-- L — pulled in, lighter, more breathing room -->
  <polyline
    points="82,70 82,148 142,148"
    fill="none"
    stroke="#1a1f3c"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Dots: lower bigger, upper smaller, both with clear space from hexagon edge -->
  <line
    x1="138" y1="115"
    x2="157" y2="87"
    stroke="#C6963A"
    stroke-width="2"
    stroke-linecap="round"
  />
  <circle cx="138" cy="115" r="6.5" fill="#C6963A"/>
  <circle cx="157" cy="87"  r="6.5" fill="#C6963A"/>

</svg>
