<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.15" />
    </linearGradient>
  </defs>

  <!-- Mark: Geometric prism/crystal -->
  <g transform="translate(16, 10)">
    <!-- Prism body -->
    <polygon points="44,8 72,52 16,52" fill="url(#markGrad)" />
    <!-- Inner light refraction line -->
    <line x1="44" y1="8" x2="44" y2="52" stroke="white" stroke-width="1.2" stroke-opacity="0.4"/>
    <!-- Bottom base highlight -->
    <polygon points="44,8 72,52 16,52" fill="none" stroke="#1e40af" stroke-width="1"/>
    <!-- Refracted rays below -->
    <line x1="16" y1="55" x2="4" y2="72" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="28" y1="55" x2="24" y2="72" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="44" y1="55" x2="44" y2="72" stroke="#2563eb" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="60" y1="55" x2="64" y2="72" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="72" y1="55" x2="84" y2="72" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="116" y="50"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="700"
    letter-spacing="6"
    fill="#111827">LUMINOS</text>

  <text x="118" y="72"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="5"
    fill="#6b7280">PEPTIDES</text>

  <!-- Divider line -->
  <line x1="116" y1="78" x2="346" y2="78" stroke="#e5e7eb" stroke-width="0.8"/>

  <!-- Tagline -->
  <text x="116" y="94"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="9"
    font-weight="400"
    letter-spacing="2.5"
    fill="#9ca3af">RESEARCH GRADE · THIRD-PARTY TESTED</text>
</svg>
