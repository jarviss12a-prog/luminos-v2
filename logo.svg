<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">

  <!-- Pointy-top hexagon: cx=110, cy=110, r=88 -->
  <!-- Top(110,22) UR(186,66) LR(186,154) Bot(110,198) LL(34,154) UL(34,66) -->
  <polygon
    points="110,22 186,66 186,154 110,198 34,154 34,66"
    fill="white"
    stroke="#C6963A"
    stroke-width="7"
    stroke-linejoin="round"
  />

  <!-- L — rounded corner via round linejoin -->
  <polyline
    points="76,68 76,155 148,155"
    fill="none"
    stroke="#1a1f3c"
    stroke-width="13"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Molecular bond: small dot → line → large dot (all gold) -->
  <line
    x1="148" y1="128"
    x2="172" y2="92"
    stroke="#C6963A"
    stroke-width="3.5"
    stroke-linecap="round"
  />
  <circle cx="148" cy="128" r="7" fill="#C6963A"/>
  <circle cx="172" cy="92" r="11" fill="#C6963A"/>

</svg>
